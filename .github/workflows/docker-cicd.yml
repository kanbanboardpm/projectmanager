name: Deploy to GCP

on:
  push:
    branches: [ dev ]

env:
  DOCKER_IMAGE_TAG_NAME: projectmanager-backend-app

jobs:
  build-and-docker-push:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build

      - name: Build the Docker image
        run: docker build . --file Dockerfile --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.DOCKER_IMAGE_TAG_NAME }}:latest

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker to use gcloud
        run: gcloud auth configure-docker

      - name: Push the Docker image to Google Container Registry (GCR)
        run: docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.DOCKER_IMAGE_TAG_NAME }}:latest

  deploy-to-gce:
    needs: build-and-docker-push
    runs-on: ubuntu-latest

    steps:
      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: SSH into GCE and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCE_INSTANCE_IP }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.GCE_SSH_PRIVATE_KEY }}
          script: |
            CONTAINER_ID=$(sudo docker ps -q --filter "publish=8888-8888")
            
            if [ ! -z "$CONTAINER_ID" ]; then
              sudo docker compose down
              sudo docker rm $CONTAINER_ID
            fi
            
            sudo -E docker pull gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.DOCKER_IMAGE_TAG_NAME }}:latest
            sudo docker compose up -d
